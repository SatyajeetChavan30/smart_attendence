<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register User | Veloces Campus</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .camera-box canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo-container">
            <img src="vel.png" alt="Veloces Campus Logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="mark-attendance.html">Mark Attendance</a></li>
            <li><a href="history.html">Attendance History</a></li>
            <li><a href="reports.html">Reports & Analytics</a></li>
            <li><a href="register-user.html" class="active">Register User</a></li>
            <li><a href="#">Profile Settings</a></li>
            <li><a href="#">Logout</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <div>
                <h1>Register New User</h1>
                <p>Create account and capture face signature</p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            <div class="stat-card">
                <h3>User Details</h3>
                <form id="register-form" style="margin-top: 20px;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="reg-name" required placeholder="e.g. John Doe">
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="reg-username" required placeholder="e.g. john.doe">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="reg-password" required placeholder="Enter password">
                    </div>
                </form>
            </div>

            <div class="stat-card" style="text-align: center;">
                <h3>Face Signature</h3>
                <div class="camera-box" style="margin: 20px 0;" id="camera-container">
                    <span id="reg-loading" style="color: white; position: absolute; z-index: 10;">Loading AI Models...</span>
                    <video id="reg-video" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s;"></video>
                </div>
                <div id="reg-status" class="face-status-badge face-status-searching">Waiting for face...</div>
                <p style="margin-top: 10px;">Look directly at the camera</p>
            </div>
        </div>

        <div style="text-align: center; margin-top: 40px;">
            <button id="capture-btn" class="btn-primary" style="padding: 15px 50px; font-size: 1.2rem; background: var(--text-muted);" disabled>
                Capture Face & Register
            </button>
            <div id="reg-result" style="margin-top: 20px; display: none;"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const video = document.getElementById('reg-video');
            const loading = document.getElementById('reg-loading');
            const statusBadge = document.getElementById('reg-status');
            const captureBtn = document.getElementById('capture-btn');
            const container = document.getElementById('camera-container');

            let currentDescriptor = null;

            try {
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri('/models'),
                    faceapi.nets.faceLandmark68Net.loadFromUri('/models'),
                    faceapi.nets.faceRecognitionNet.loadFromUri('/models')
                ]);
                loading.innerText = "Starting camera...";
            } catch (err) {
                loading.innerText = "Failed to load AI models.";
                console.error(err);
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
                
                video.addEventListener('playing', () => {
                    loading.style.display = 'none';
                    video.style.opacity = '1';

                    const canvas = faceapi.createCanvasFromMedia(video);
                    container.appendChild(canvas);
                    const displaySize = { width: video.videoWidth || 640, height: video.videoHeight || 480 };
                    faceapi.matchDimensions(canvas, displaySize);

                    setInterval(async () => {
                        const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                        
                        const ctx = canvas.getContext('2d');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);

                        if (detection) {
                            const resizedDetection = faceapi.resizeResults(detection, displaySize);
                            faceapi.draw.drawDetections(canvas, resizedDetection);
                            faceapi.draw.drawFaceLandmarks(canvas, resizedDetection);

                            statusBadge.innerText = '✔ Face Ready';
                            statusBadge.className = 'face-status-badge face-status-found';
                            currentDescriptor = Array.from(detection.descriptor);
                            
                            captureBtn.disabled = false;
                            captureBtn.style.background = 'var(--primary)';
                        } else {
                            statusBadge.innerText = 'Looking for face...';
                            statusBadge.className = 'face-status-badge face-status-searching';
                            currentDescriptor = null;
                            
                            captureBtn.disabled = true;
                            captureBtn.style.background = 'var(--text-muted)';
                        }
                        }, 500);
                });
            } catch (err) {
                loading.innerText = "Camera access denied.";
                console.error(err);
            }

            captureBtn.addEventListener('click', async () => {
                if (!currentDescriptor) return;

                const name = document.getElementById('reg-name').value;
                const username = document.getElementById('reg-username').value;
                const password = document.getElementById('reg-password').value;
                const resultDiv = document.getElementById('reg-result');

                if (!name || !username || !password) {
                    alert("Please fill all user details.");
                    return;
                }

                captureBtn.disabled = true;
                captureBtn.innerText = "Registering...";

                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name,
                            username,
                            password,
                            face_descriptor: currentDescriptor
                        })
                    });

                    const data = await response.json();
                    
                    resultDiv.style.display = 'block';
                    if (data.success) {
                        resultDiv.innerHTML = `<span style="color: #00b894; font-weight: bold;">✔ ${data.message}</span>`;
                        document.getElementById('register-form').reset();
                    } else {
                        resultDiv.innerHTML = `<span style="color: #d63031; font-weight: bold;">✖ Error: ${data.message}</span>`;
                    }
                } catch (err) {
                    resultDiv.style.display = 'block';
                    resultDiv.innerHTML = `<span style="color: #d63031; font-weight: bold;">✖ Network Error</span>`;
                }
                
                captureBtn.innerText = "Capture Face & Register";
                captureBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
